<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fudbalske Streaks</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); }
    .tab-active { border-bottom: 3px solid #22c55e; color: #22c55e; font-weight: 600; }
    .streak-hot { background: linear-gradient(90deg, #22c55e, #eab308); color: black; font-weight: bold; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen pb-20">

  <div class="max-w-4xl mx-auto">
    <div class="bg-slate-900 p-5 border-b border-slate-700 sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="text-4xl">⚽</div>
        <div>
          <h1 class="text-3xl font-bold">Fudbalske Streaks</h1>
          <p class="text-slate-400 text-sm">API-Football • Nizovi i statistika</p>
        </div>
      </div>
    </div>

    <!-- Tabovi -->
    <div class="flex bg-slate-900 border-b border-slate-700 text-sm">
      <button onclick="showTab(0)" class="tab tab-active flex-1 py-4" id="tab0">Danas</button>
      <button onclick="showTab(1)" class="tab flex-1 py-4" id="tab1">🔥 Streaks</button>
      <button onclick="showTab(2)" class="tab flex-1 py-4" id="tab2">H2H</button>
    </div>

    <div class="p-4" id="content"></div>
  </div>

  <script>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    const BASE_URL = "https://v3.football.api-sports.io";

    async function apiGet(endpoint) {
      try {
        const res = await fetch(`${BASE_URL}${endpoint}`, {
          headers: { 'x-apisports-key': API_KEY }
        });
        const json = await res.json();
        return json.response || [];
      } catch (e) { return []; }
    }

    function showTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('tab-active', i===n));
      if (n===0) loadToday();
      if (n===1) loadStreaks();
      if (n===2) loadH2H();
    }

    // ==================== DANAS ====================
    async function loadToday() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i></div>`;

      const today = new Date().toISOString().split('T')[0];
      const matches = await apiGet(`/fixtures?date=${today}`);

      let html = `<h2 class="text-xl font-bold mb-4">Utakmice danas (${matches.length})</h2>`;

      matches.forEach(m => {
        const h = m.teams.home;
        const a = m.teams.away;
        const g = m.goals || {};
        html += `
          <div class="card bg-slate-900 rounded-2xl p-5 mb-4">
            <div class="flex justify-between items-center">
              <div class="flex-1 flex items-center gap-3">
                <img src="${h.logo}" class="w-8 h-8" onerror="this.style.display='none'">
                <span>${h.name}</span>
              </div>
              <div class="text-center font-bold text-2xl">${g.home ?? '-'}:${g.away ?? '-'}</div>
              <div class="flex-1 flex items-center gap-3 justify-end">
                <span>${a.name}</span>
                <img src="${a.logo}" class="w-8 h-8" onerror="this.style.display='none'">
              </div>
            </div>
            <div class="text-center text-xs text-slate-500 mt-2">${m.league.name} • ${m.fixture.status.long}</div>
          </div>`;
      });
      content.innerHTML = html || `<p class="text-center py-10">Nema utakmica danas.</p>`;
    }

    // ==================== STREKS (NIZOVI) ====================
    async function loadStreaks() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><p class="mt-4">Tražim nizove...</p></div>`;

      const leagues = [39,140,135,78,61,88,40,41]; // Najjače lige
      let html = `<h2 class="text-xl font-bold mb-4">🔥 Najduži nizovi (Over 2.5 i BTTS)</h2>`;

      for (let league of leagues) {
        const fixtures = await apiGet(`/fixtures?league=${league}&season=2025&last=15`);
        
        const teamStats = {};

        fixtures.forEach(f => {
          const homeName = f.teams.home.name;
          const awayName = f.teams.away.name;
          const totalGoals = (f.goals.home || 0) + (f.goals.away || 0);
          const btts = (f.goals.home > 0 && f.goals.away > 0);

          [homeName, awayName].forEach(team => {
            if (!teamStats[team]) teamStats[team] = { overStreak: 0, bttsStreak: 0, maxOver: 0, maxBtts: 0, lastOver: false, lastBtts: false };

            const isOver = totalGoals >= 3;
            const isBtts = btts;

            // Over 2.5 streak
            if (isOver) {
              teamStats[team].overStreak++;
              teamStats[team].maxOver = Math.max(teamStats[team].maxOver, teamStats[team].overStreak);
            } else {
              teamStats[team].overStreak = 0;
            }

            // BTTS streak
            if (isBtts) {
              teamStats[team].bttsStreak++;
              teamStats[team].maxBtts = Math.max(teamStats[team].maxBtts, teamStats[team].bttsStreak);
            } else {
              teamStats[team].bttsStreak = 0;
            }
          });
        });

        // Prikaz timova sa nizom 3+
        Object.entries(teamStats)
          .filter(([_, s]) => s.maxOver >= 3 || s.maxBtts >= 3)
          .sort((a,b) => b[1].maxOver - a[1].maxOver)
          .forEach(([team, s]) => {
            if (s.maxOver >= 3) {
              html += `
                <div class="card bg-slate-900 rounded-2xl p-5 mb-3 streak-hot">
                  <div class="flex justify-between">
                    <span class="font-bold">${team}</span>
                    <span class="text-orange-400">${s.maxOver} utakmica zaredom OVER 2.5 🔥</span>
                  </div>
                </div>`;
            }
          });
      }

      content.innerHTML = html || `<p class="text-center py-10 text-slate-400">Trenutno nema jakih nizova.</p>`;
    }

    // ==================== H2H ====================
    async function loadH2H() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-4">H2H - Međusobni dueli</h2>
        <div class="bg-slate-900 rounded-2xl p-6">
          <input id="team1" type="text" placeholder="Prvi tim" class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none text-white">
          <input id="team2" type="text" placeholder="Drugi tim" class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none text-white">
          <button onclick="searchH2H()" class="w-full bg-green-600 py-4 rounded-xl font-bold text-lg">TRAŽI H2H</button>
        </div>
        <div id="h2h-result" class="mt-6"></div>
      `;
    }

    async function searchH2H() {
      const t1 = document.getElementById('team1').value.trim();
      const t2 = document.getElementById('team2').value.trim();
      const result = document.getElementById('h2h-result');
      
      if (!t1 || !t2) return result.innerHTML = `<p class="text-red-400">Unesi oba tima!</p>`;

      result.innerHTML = `<p class="text-center py-8">Pretražujem...</p>`;

      const data = await apiGet(`/fixtures/headtohead?h2h=${encodeURIComponent(t1)}-${encodeURIComponent(t2)}`);
      
      let html = `<h3 class="font-bold mb-3">${t1} vs ${t2} (${data.length} mečeva)</h3>`;
      data.slice(0,10).forEach(m => {
        html += `
          <div class="card bg-slate-900 p-4 rounded-2xl mb-3 text-sm">
            <div class="text-slate-400">${m.fixture.date.split('T')[0]} • ${m.league.name}</div>
            <div class="flex justify-between mt-1">
              <span>${m.teams.home.name} <b>${m.goals.home}</b></span>
              <span><b>${m.goals.away}</b> ${m.teams.away.name}</span>
            </div>
          </div>`;
      });
      result.innerHTML = html;
    }

    // Start
    window.onload = () => showTab(0);
  </script>
</body>
</html>

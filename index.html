<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fudbalske Streaks</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); }
    .tab-active { border-bottom: 3px solid #22c55e; color: #22c55e; font-weight: 600; }
    .streak { background: linear-gradient(90deg, #ca8a04, #eab308); color: black; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen pb-20">

  <div class="max-w-4xl mx-auto">
    <div class="bg-slate-900 p-5 border-b border-slate-700 sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="text-4xl">⚽</div>
        <div>
          <h1 class="text-3xl font-bold">Fudbalske Streaks</h1>
          <p class="text-slate-400 text-sm">API-Football • Nizovi</p>
        </div>
      </div>
    </div>

    <div class="flex bg-slate-900 border-b border-slate-700">
      <button onclick="showTab(0)" class="tab tab-active flex-1 py-4" id="tab0">Danas</button>
      <button onclick="showTab(1)" class="tab flex-1 py-4" id="tab1">🔥 Streaks</button>
      <button onclick="showTab(2)" class="tab flex-1 py-4" id="tab2">H2H</button>
    </div>

    <div class="p-4" id="content"></div>
  </div>

  <script>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    const BASE_URL = "https://v3.football.api-sports.io";

    async function apiGet(endpoint) {
      try {
        const res = await fetch(`${BASE_URL}${endpoint}`, {
          headers: { 'x-apisports-key': API_KEY }
        });
        const json = await res.json();
        return json.response || [];
      } catch (e) { return []; }
    }

    function showTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('tab-active', i===n));
      if (n===0) loadToday();
      if (n===1) loadStreaks();
      if (n===2) loadH2H();
    }

    // DANAS
    async function loadToday() {
      const content = document.getElementById('content');
      content.innerHTML = `<p class="text-center py-10">Učitavanje...</p>`;

      const today = new Date().toISOString().split('T')[0];
      const matches = await apiGet(`/fixtures?date=${today}`);

      let html = `<h2 class="text-xl font-bold mb-4">Utakmice danas (${matches.length})</h2>`;

      matches.forEach(m => {
        const h = m.teams.home;
        const a = m.teams.away;
        const g = m.goals || {};
        html += `
          <div class="card bg-slate-900 rounded-2xl p-5 mb-4">
            <div class="flex justify-between items-center">
              <div class="flex-1 flex items-center gap-3">
                <img src="${h.logo}" class="w-9 h-9 rounded-full" onerror="this.src='https://via.placeholder.com/36?text=⚽'">
                <span class="font-medium">${h.name}</span>
              </div>
              <div class="text-center">
                <div class="text-3xl font-bold">${g.home ?? '-'} : ${g.away ?? '-'}</div>
                <div class="text-xs text-slate-500">${m.fixture.status.long}</div>
              </div>
              <div class="flex-1 flex items-center gap-3 justify-end">
                <span class="font-medium">${a.name}</span>
                <img src="${a.logo}" class="w-9 h-9 rounded-full" onerror="this.src='https://via.placeholder.com/36?text=⚽'">
              </div>
            </div>
            <div class="text-center text-xs text-slate-400 mt-3">${m.league.name}</div>
          </div>`;
      });

      content.innerHTML = html || `<p class="text-center py-10 text-slate-400">Nema utakmica danas.</p>`;
    }

    // STREAKS - poboljšano
    async function loadStreaks() {
      const content = document.getElementById('content');
      content.innerHTML = `<p class="text-center py-12">Tražim nizove preko više liga...</p>`;

      // Više liga + trenutna sezona
      const leagues = [39,140,135,78,61,88,40,41,42,43,44,45]; 
      let html = `<h2 class="text-xl font-bold mb-4">🔥 Timovi sa nizovima Over 2.5</h2>`;

      for (let league of leagues) {
        const data = await apiGet(`/fixtures?league=${league}&season=2025&last=12`);
        
        const stats = {};
        data.forEach(f => {
          const home = f.teams.home.name;
          const away = f.teams.away.name;
          const total = (f.goals.home||0) + (f.goals.away||0);

          [home, away].forEach(team => {
            if (!stats[team]) stats[team] = {streak:0, max:0};
            if (total >= 3) {
              stats[team].streak++;
              stats[team].max = Math.max(stats[team].max, stats[team].streak);
            } else {
              stats[team].streak = 0;
            }
          });
        });

        Object.entries(stats)
          .filter(([_,s]) => s.max >= 3)
          .sort((a,b) => b[1].max - a[1].max)
          .forEach(([team, s]) => {
            html += `
              <div class="card streak rounded-2xl p-5 mb-3">
                <div class="font-bold text-lg">${team}</div>
                <div class="text-xl">${s.max} utakmica zaredom OVER 2.5 🔥</div>
              </div>`;
          });
      }

      content.innerHTML = html || `<p class="text-center py-10 text-slate-400">Trenutno nema jakih nizova (free plan ograničenje).</p>`;
    }

    async function loadH2H() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-4">H2H Međusobni dueli</h2>
        <div class="bg-slate-900 rounded-2xl p-6 space-y-4">
          <input id="t1" placeholder="Prvi tim" value="Crvena Zvezda" class="w-full bg-slate-800 p-4 rounded-xl">
          <input id="t2" placeholder="Drugi tim" value="Partizan" class="w-full bg-slate-800 p-4 rounded-xl">
          <button onclick="searchH2H()" class="w-full bg-green-600 py-4 rounded-xl font-bold">TRAŽI H2H</button>
        </div>
        <div id="h2hres" class="mt-6"></div>
      `;
    }

    async function searchH2H() {
      const t1 = document.getElementById('t1').value;
      const t2 = document.getElementById('t2').value;
      const res = document.getElementById('h2hres');
      res.innerHTML = `<p>Pretražujem...</p>`;

      const data = await apiGet(`/fixtures/headtohead?h2h=${t1}-${t2}`);
      let html = `<h3 class="mb-3">${t1} vs ${t2}</h3>`;
      data.slice(0,8).forEach(m => {
        html += `<div class="bg-slate-900 p-4 rounded-2xl mb-3">
          <small>${m.league.name}</small><br>
          ${m.teams.home.name} ${m.goals.home} - ${m.goals.away} ${m.teams.away.name}
        </div>`;
      });
      res.innerHTML = html;
    }

    window.onload = () => showTab(0);
  </script>
</body>
</html>

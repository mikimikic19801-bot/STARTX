<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fudbalske Streaks</title>
  <meta name="description" content="Streaks, H2H, Over/Under i statistika" />
  
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
    .tab-active { border-bottom: 3px solid #22c55e; color: #22c55e; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen pb-20">

  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="bg-slate-900 p-5 border-b border-slate-700 sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="text-4xl">⚽</div>
        <div>
          <h1 class="text-3xl font-bold">Fudbalske Streaks</h1>
          <p class="text-slate-400 text-sm">API-Football • Live statistika</p>
        </div>
      </div>
    </div>

    <!-- Tabovi -->
    <div class="flex bg-slate-900 border-b border-slate-700">
      <button onclick="showTab(0)" class="tab tab-active flex-1 py-4 text-center font-medium" id="tab0">Danas</button>
      <button onclick="showTab(1)" class="tab flex-1 py-4 text-center font-medium" id="tab1">Streaks</button>
      <button onclick="showTab(2)" class="tab flex-1 py-4 text-center font-medium" id="tab2">H2H</button>
    </div>

    <div class="p-4" id="content">
      <!-- Dinamički se menja -->
    </div>
  </div>

  <script>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    const BASE_URL = "https://v3.football.api-sports.io";

    async function apiGet(endpoint) {
      try {
        const res = await fetch(`${BASE_URL}${endpoint}`, {
          headers: { 'x-apisports-key': API_KEY }
        });
        const json = await res.json();
        return json.response || [];
      } catch (e) {
        console.error(e);
        return [];
      }
    }

    // === TABOVI ===
    function showTab(n) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('tab-active', i === n);
      });
      
      if (n === 0) loadToday();
      if (n === 1) loadStreaks();
      if (n === 2) loadH2H();
    }

    // 1. DANAS
    async function loadToday() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><p class="mt-4">Učitavanje utakmica...</p></div>`;

      const today = new Date().toISOString().split('T')[0];
      const matches = await apiGet(`/fixtures?date=${today}`);

      let html = `<h2 class="text-xl font-bold mb-4">Utakmice danas (${matches.length})</h2>`;

      if (matches.length === 0) {
        html += `<p class="text-center py-10 text-slate-400">Nema utakmica danas.</p>`;
      } else {
        matches.forEach(m => {
          const h = m.teams.home;
          const a = m.teams.away;
          const g = m.goals;
          html += `
            <div class="card bg-slate-900 rounded-2xl p-5 mb-4 border border-slate-700">
              <div class="flex justify-between items-center">
                <div class="flex-1 flex items-center gap-3">
                  <img src="${h.logo}" class="w-9 h-9" onerror="this.style.display='none'">
                  <span class="font-medium">${h.name}</span>
                </div>
                <div class="text-center">
                  <div class="text-3xl font-bold">${g.home ?? '-'}:${g.away ?? '-'}</div>
                  <div class="text-xs text-slate-500">${m.fixture.status.long}</div>
                </div>
                <div class="flex-1 flex items-center gap-3 justify-end">
                  <span class="font-medium">${a.name}</span>
                  <img src="${a.logo}" class="w-9 h-9" onerror="this.style.display='none'">
                </div>
              </div>
            </div>`;
        });
      }
      content.innerHTML = html;
    }

    // 2. STREAKS (Over 2.5 u nizu + BTTS)
    async function loadStreaks() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><p class="mt-4">Analiza streakova...</p></div>`;

      // Uzimamo neke popularne lige
      const leagues = [39, 140, 135, 78, 61, 88]; // EPL, La Liga, Serie A, Bundesliga, Ligue 1, Eredivisie
      let allMatches = [];

      for (let league of leagues) {
        const data = await apiGet(`/fixtures?league=${league}&season=2025&last=10`);
        allMatches = allMatches.concat(data);
      }

      let html = `<h2 class="text-xl font-bold mb-4">🔥 Streaks (poslednjih 10 utakmica)</h2>`;

      // Jednostavna analiza
      const teams = {};
      allMatches.forEach(m => {
        const h = m.teams.home.name;
        const a = m.teams.away.name;
        const totalGoals = (m.goals.home || 0) + (m.goals.away || 0);
        const btts = (m.goals.home > 0 && m.goals.away > 0);

        [h, a].forEach(team => {
          if (!teams[team]) teams[team] = { over25: 0, btts: 0, total: 0 };
          teams[team].total++;
          if (totalGoals > 2.5) teams[team].over25++;
          if (btts) teams[team].btts++;
        });
      });

      Object.entries(teams)
        .filter(([_, stats]) => stats.total >= 5)
        .sort((a, b) => (b[1].over25 / b[1].total) - (a[1].over25 / a[1].total))
        .slice(0, 15)
        .forEach(([team, stats]) => {
          const overPct = Math.round((stats.over25 / stats.total) * 100);
          html += `
            <div class="card bg-slate-900 rounded-2xl p-5 mb-3">
              <div class="font-semibold">${team}</div>
              <div class="flex justify-between text-sm mt-2">
                <span class="text-orange-400">Over 2.5: ${stats.over25}/${stats.total} (${overPct}%)</span>
                <span class="text-sky-400">BTTS: ${stats.btts}/${stats.total}</span>
              </div>
            </div>`;
        });

      content.innerHTML = html;
    }

    // 3. H2H
    async function loadH2H() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-4">H2H - Međusobni dueli</h2>
        <div class="bg-slate-900 rounded-2xl p-5">
          <input id="team1" type="text" placeholder="Prvi tim (npr. Real Madrid)" 
                 class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none">
          <input id="team2" type="text" placeholder="Drugi tim (npr. Barcelona)" 
                 class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none">
          <button onclick="searchH2H()" 
                  class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold">
            TRAŽI H2H
          </button>
        </div>
        <div id="h2h-result" class="mt-6"></div>
      `;
    }

    async function searchH2H() {
      const t1 = document.getElementById('team1').value.trim();
      const t2 = document.getElementById('team2').value.trim();
      const resultDiv = document.getElementById('h2h-result');

      if (!t1 || !t2) {
        resultDiv.innerHTML = `<p class="text-red-400">Unesi oba tima!</p>`;
        return;
      }

      resultDiv.innerHTML = `<p class="text-center py-8">Pretražujem...</p>`;

      const data = await apiGet(`/fixtures/headtohead?h2h=${t1.replace(/ /g,'-')}-${t2.replace(/ /g,'-')}`);

      let html = `<h3 class="font-bold mb-3">${t1} vs ${t2}</h3>`;
      
      if (data.length === 0) {
        html += `<p>Nema podataka.</p>`;
      } else {
        data.slice(0, 8).forEach(m => {
          html += `
            <div class="card bg-slate-900 rounded-2xl p-4 mb-3 text-sm">
              <div>${m.fixture.date.split('T')[0]} • ${m.league.name}</div>
              <div class="flex justify-between mt-2">
                <span>${m.teams.home.name} ${m.goals.home}</span>
                <span>${m.goals.away} ${m.teams.away.name}</span>
              </div>
            </div>`;
        });
      }
      resultDiv.innerHTML = html;
    }

    // Pokretanje aplikacije
    window.onload = () => showTab(0);
  </script>
</body>
</html>
